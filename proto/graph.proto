syntax = "proto3";

option go_package = "fizz/proto";

message Matrix {
  repeated Row rows = 1;
}

message Row {
  repeated Cell cells = 1;
}

message Cell {
  bool has_link = 1;
  string name = 2;
  repeated string labels = 3;
}

message Nodes {
  repeated string json = 1;
}

message Link {
  int64 src = 1;
  int64 dest = 2;
  string name = 3;
  repeated string labels = 4;
  double weight = 5;
  repeated Message messages = 6;
  int64 req_id = 7;
  map<int64, int64> new_to_old_threads = 8;
  string type = 9;
  // Action return values for this transition. name is the action name (or
  // role.action for role actions); value is the starlark repr of the
  // returned value (e.g. `"x"` for a string, `42` for an int, `[1, 2]`
  // for a list). Sorted by name for deterministic output.
  repeated NameValue returns = 10;
}

message Links {
  int64 total_nodes = 1;
  repeated Link links = 2;
}

message Message {
  string sender = 1;
  repeated string receivers = 2;
  string name = 3;
  repeated NameValue values = 4;
  bool is_return = 5;
  bool lossy = 6;
}

message NameValue {
  string name = 1;
  string value = 2;
}
